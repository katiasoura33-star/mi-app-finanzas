<!DOCTYPE html>
<html lang="es">
<head>
<link rel="manifest" href="manifest.json">

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('App lista para instalar'))
        .catch(err => console.log('Error al registrar', err));
    });
  }
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Finanzas Pro">
    <meta name="theme-color" content="#050810">
    
    <title>Finanzas Pro</title>
    
    <!-- Librerías Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap');
        
        :root {
            --bg: #050810;
            --card: rgba(13, 20, 38, 0.7);
        }

        body { 
            background-color: var(--bg); 
            color: #f1f5f9; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            overscroll-behavior-y: contain;
        }

        .glass-card { 
            background: var(--card); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        .editable-text {
            background: transparent;
            border: none;
            color: inherit;
            outline: none;
            width: 100%;
            border-bottom: 1px dashed transparent;
            transition: 0.2s;
        }
        .editable-text:hover, .editable-text:focus {
            border-bottom: 1px dashed rgba(255,255,255,0.4);
        }

        .status-vigente { border-left: 5px solid #10b981; }
        .status-proximo { border-left: 5px solid #fbbf24; }
        .status-vencido { border-left: 5px solid #f43f5e; }
        .status-pagado { border-left: 5px solid #6366f1; opacity: 0.5; filter: grayscale(50%); }

        .active-scale:active { transform: scale(0.95); transition: 0.1s; }
        
        .chart-container { position: relative; height: 220px; width: 100%; }

        ::-webkit-scrollbar { display: none; }

        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        .accordion-open {
            max-height: 2000px; /* Suficiente para listas largas */
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    i.style.width = `${size}px`;
                    i.style.height = `${size}px`;
                    i.className = className;
                    iconRef.current.appendChild(i);
                    lucide.createIcons({ node: iconRef.current });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center pointer-events-none"></span>;
        };

        const FinancialChart = ({ data }) => {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (chartRef.current) {
                    if (chartInstance.current) chartInstance.current.destroy();
                    const ctx = chartRef.current.getContext('2d');
                    chartInstance.current = new Chart(ctx, {
                        type: 'doughnut',
                        data: data,
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            cutout: '75%',
                            plugins: { legend: { display: false } },
                            animation: { animateScale: true }
                        }
                    });
                }
                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [data]);

            return <div className="chart-container"><canvas ref={chartRef}></canvas></div>;
        };

        const App = () => {
            const [view, setView] = useState('summary');
            // Estado para controlar qué secciones están abiertas
            const [openSections, setOpenSections] = useState({ incomes: true, expenses: true, installments: true });

            const [data, setData] = useState(() => {
                const saved = localStorage.getItem('fpro_martin_final');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (!parsed.userName) parsed.userName = 'Martin Mantineo'; 
                    return parsed;
                }
                return { 
                    userName: 'Tu Nombre',
                    incomes: [{ id: 1, title: 'Mi Sueldo', amount: 500000, date: new Date().toISOString().split('T')[0] }], 
                    expenses: [],
                    installments: []
                };
            });

            useEffect(() => {
                document.title = `Finanzas Pro - ${data.userName || 'Usuario'}`;
            }, [data.userName]);

            useEffect(() => {
                localStorage.setItem('fpro_martin_final', JSON.stringify(data));
            }, [data]);

            const totals = useMemo(() => {
                const inc = data.incomes.reduce((a, b) => a + (Number(b.amount) || 0), 0);
                const expFixed = data.expenses.reduce((a, b) => a + (Number(b.amount) || 0), 0);
                const expInstallments = data.installments.reduce((a, b) => a + (Number(b.monthlyFee) || 0), 0);
                const expTotal = expFixed + expInstallments;
                const bal = inc - expTotal;
                const ratio = inc > 0 ? (expTotal / inc) * 100 : 0;
                
                return { inc, exp: expTotal, bal, ratio: Math.min(ratio, 100), expFixed, expInstallments };
            }, [data]);

            const chartData = useMemo(() => ({
                labels: ['Gastos Fijos', 'Cuotas', 'Libre'],
                datasets: [{
                    data: [totals.expFixed, totals.expInstallments, Math.max(0, totals.bal)],
                    backgroundColor: ['#f43f5e', '#fbbf24', '#6366f1'],
                    borderWidth: 0,
                    hoverOffset: 4
                }]
            }), [totals]);

            const getStatusClass = (dateStr, status) => {
                if (status === 'paid') return { card: 'status-pagado', bg: 'bg-indigo-500/20', text: 'text-indigo-400', label: 'PAGADO ✓', icon: 'check-circle' };
                const today = new Date(); today.setHours(0,0,0,0);
                const target = new Date(dateStr); target.setHours(0,0,0,0);
                const diffDays = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
                if (diffDays < 0) return { card: 'status-vencido', bg: 'bg-rose-500/20', text: 'text-rose-500', label: `VENCIDO (${Math.abs(diffDays)}d)`, icon: 'alert-triangle' };
                if (diffDays <= 5) return { card: 'status-proximo', bg: 'bg-amber-500/20', text: 'text-amber-500', label: `VENCE EN ${diffDays}D`, icon: 'clock' };
                return { card: 'status-vigente', bg: 'bg-emerald-500/10', text: 'text-emerald-500', label: 'VIGENTE', icon: 'shield-check' };
            };

            const addItem = (type) => {
                const base = { id: Date.now(), title: 'Nuevo Concepto', date: new Date().toISOString().split('T')[0] };
                if (type === 'incomes') {
                    setData(prev => ({ ...prev, incomes: [{ ...base, amount: 0 }, ...prev.incomes] }));
                } else if (type === 'expenses') {
                    setData(prev => ({ ...prev, expenses: [{ ...base, amount: 0, status: 'pending' }, ...prev.expenses] }));
                } else if (type === 'installments') {
                    setData(prev => ({ ...prev, installments: [{ ...base, monthlyFee: 0, paid: 1, total: 12, status: 'pending' }, ...prev.installments] }));
                }
                // Al agregar, nos aseguramos de que la sección esté abierta
                setOpenSections(prev => ({ ...prev, [type]: true }));
            };

            const editFieldInline = (type, id, field, val) => {
                let parsedVal = val;
                if (['amount', 'monthlyFee', 'paid', 'total'].includes(field)) {
                    parsedVal = val === '' ? '' : Number(val);
                }
                setData(prev => ({ 
                    ...prev, 
                    [type]: prev[type].map(i => i.id === id ? { ...i, [field]: parsedVal } : i) 
                }));
            };

            const deleteItem = (type, id) => {
                if(confirm("¿Eliminar este registro definitivamente?")) {
                    setData(prev => ({ ...prev, [type]: prev[type].filter(i => i.id !== id) }));
                }
            };

            const toggleStatus = (type, id) => {
                setData(prev => ({ ...prev, [type]: prev[type].map(i => i.id === id ? { ...i, status: i.status === 'paid' ? 'pending' : 'paid' } : i) }));
            };

            const modifyInstallment = (id, change) => {
                setData(prev => ({
                    ...prev,
                    installments: prev.installments.map(i => {
                        if (i.id === id) {
                            const newPaid = Math.max(0, Math.min(Number(i.paid) + change, Number(i.total)));
                            return { ...i, paid: newPaid };
                        }
                        return i;
                    })
                }));
            };

            const toggleSection = (sec) => {
                setOpenSections(prev => ({ ...prev, [sec]: !prev[sec] }));
            };

            return (
                <div className="min-h-screen pb-32">
                    {/* ENCABEZADO */}
                    <header className="p-6 pt-10 max-w-2xl mx-auto flex justify-between items-center z-40 relative">
                        <div className="flex items-center gap-4 flex-1">
                            <div className="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-600/30 shrink-0">
                                <Icon name="wallet" size={24} className="text-white"/>
                            </div>
                            <div className="flex-1 min-w-0">
                                <input
                                    type="text"
                                    value={data.userName || ''}
                                    onChange={(e) => setData(prev => ({ ...prev, userName: e.target.value }))}
                                    placeholder="Tu Nombre"
                                    className="editable-text text-xl font-black text-white leading-none tracking-tighter uppercase truncate w-full"
                                />
                                <p className="text-[10px] font-bold text-indigo-400 tracking-[0.2em] mt-1 uppercase">Finanzas Pro</p>
                            </div>
                        </div>
                    </header>

                    <main className="px-5 max-w-2xl mx-auto animate-fade">
                        {view === 'summary' && (
                            <div className="space-y-6">
                                
                                {/* TARJETA DE BALANCE */}
                                <div className="glass-card p-8 relative overflow-hidden border-t-2 border-indigo-500/50">
                                    <div className="absolute top-0 right-0 w-40 h-40 bg-indigo-600/20 blur-[50px] rounded-full -mr-20 -mt-20"></div>
                                    <div className="relative z-10">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Balance del Mes</p>
                                        <h2 className={`text-5xl font-black tracking-tighter mb-6 ${totals.bal >= 0 ? 'text-white' : 'text-rose-500'}`}>
                                            ${totals.bal.toLocaleString('es-AR')}
                                        </h2>
                                        
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="bg-emerald-500/10 border border-emerald-500/20 p-4 rounded-2xl">
                                                <p className="text-[9px] font-black text-emerald-500 uppercase tracking-widest mb-1">Ingresos</p>
                                                <p className="text-xl font-black text-white">${totals.inc.toLocaleString('es-AR')}</p>
                                            </div>
                                            <div className="bg-rose-500/10 border border-rose-500/20 p-4 rounded-2xl">
                                                <p className="text-[9px] font-black text-rose-500 uppercase tracking-widest mb-1">Gastos Totales</p>
                                                <p className="text-xl font-black text-white">${totals.exp.toLocaleString('es-AR')}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* SECCIÓN INGRESOS */}
                                <section className="space-y-2">
                                    <div className="flex justify-between items-center px-1">
                                        <button 
                                            onClick={() => toggleSection('incomes')}
                                            className="flex items-center gap-2 group"
                                        >
                                            <Icon name={openSections.incomes ? "chevron-down" : "chevron-right"} size={14} className="text-emerald-500"/>
                                            <h3 className="text-[11px] font-black text-emerald-500 uppercase tracking-widest flex items-center gap-2">
                                                <Icon name="trending-up" size={14}/> Mis Ingresos 
                                                {!openSections.incomes && <span className="text-white/40 ml-1">(${totals.inc.toLocaleString('es-AR')})</span>}
                                            </h3>
                                        </button>
                                        <button onClick={() => addItem('incomes')} className="flex items-center gap-1 px-3 py-1.5 bg-emerald-600 text-white rounded-lg text-[10px] font-black active-scale shadow-lg shadow-emerald-900/30">
                                            <Icon name="plus" size={12}/> AGREGAR
                                        </button>
                                    </div>
                                    <div className={`accordion-content ${openSections.incomes ? 'accordion-open' : ''} space-y-2`}>
                                        {data.incomes.map(i => (
                                            <div key={i.id} className="glass-card p-4 flex justify-between items-center border-l-4 border-emerald-500">
                                                <div className="flex-1">
                                                    <input type="text" value={i.title} onChange={(e) => editFieldInline('incomes', i.id, 'title', e.target.value)} className="editable-text font-bold text-sm text-white"/>
                                                    <input type="date" value={i.date} onChange={(e) => editFieldInline('incomes', i.id, 'date', e.target.value)} className="editable-text text-[10px] text-slate-500 font-bold uppercase w-auto mt-1"/>
                                                </div>
                                                <div className="flex items-center gap-3">
                                                    <div className="flex items-center">
                                                        <span className="text-emerald-500 font-black text-sm mr-1">$</span>
                                                        <input type="text" inputMode="numeric" value={i.amount === '' ? '' : Number(i.amount).toLocaleString('es-AR')} onChange={(e) => editFieldInline('incomes', i.id, 'amount', e.target.value.replace(/\D/g, ''))} className="editable-text w-28 text-right font-black text-xl text-white"/>
                                                    </div>
                                                    <button onClick={() => deleteItem('incomes', i.id)} className="p-2 text-slate-600 hover:text-rose-500"><Icon name="trash-2" size={14}/></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                {/* SECCIÓN GASTOS FIJOS */}
                                <section className="space-y-2">
                                    <div className="flex justify-between items-center px-1">
                                        <button 
                                            onClick={() => toggleSection('expenses')}
                                            className="flex items-center gap-2 group"
                                        >
                                            <Icon name={openSections.expenses ? "chevron-down" : "chevron-right"} size={14} className="text-rose-500"/>
                                            <h3 className="text-[11px] font-black text-rose-500 uppercase tracking-widest flex items-center gap-2">
                                                <Icon name="calendar-days" size={14}/> Gastos Fijos
                                                {!openSections.expenses && <span className="text-white/40 ml-1">({data.expenses.filter(e => e.status !== 'paid').length} PEND.)</span>}
                                            </h3>
                                        </button>
                                        <button onClick={() => addItem('expenses')} className="flex items-center gap-1 px-3 py-1.5 bg-rose-600 text-white rounded-lg text-[10px] font-black active-scale shadow-lg shadow-rose-900/30">
                                            <Icon name="plus" size={12}/> AGREGAR
                                        </button>
                                    </div>
                                    <div className={`accordion-content ${openSections.expenses ? 'accordion-open' : ''} space-y-3`}>
                                        {data.expenses.map(i => {
                                            const s = getStatusClass(i.date, i.status);
                                            return (
                                                <div key={i.id} className={`glass-card p-4 transition-all duration-300 ${s.card}`}>
                                                    <div className="flex justify-between items-start mb-3">
                                                        <div className="flex-1">
                                                            <input type="text" value={i.title} onChange={(e) => editFieldInline('expenses', i.id, 'title', e.target.value)} className="editable-text font-black text-sm text-white"/>
                                                            <div className="flex items-center gap-1 mt-1">
                                                                <Icon name="calendar" size={10} className="text-slate-500"/>
                                                                <input type="date" value={i.date} onChange={(e) => editFieldInline('expenses', i.id, 'date', e.target.value)} className="editable-text text-[10px] text-slate-400 font-bold w-auto"/>
                                                                <span className={`px-1.5 py-0.5 rounded text-[8px] font-black ${s.bg} ${s.text} ml-2 uppercase tracking-tighter`}>{s.label}</span>
                                                            </div>
                                                        </div>
                                                        <div className="flex items-center">
                                                            <span className="text-slate-500 font-bold text-xs mr-1">$</span>
                                                            <input type="text" inputMode="numeric" value={i.amount === '' ? '' : Number(i.amount).toLocaleString('es-AR')} onChange={(e) => editFieldInline('expenses', i.id, 'amount', e.target.value.replace(/\D/g, ''))} className="editable-text w-24 text-right font-black text-xl text-white"/>
                                                        </div>
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => toggleStatus('expenses', i.id)} className={`flex-1 py-2 rounded-lg text-[9px] font-black uppercase tracking-widest transition-all active-scale flex items-center justify-center gap-2 ${i.status === 'paid' ? 'bg-indigo-600 text-white' : 'bg-white text-slate-900'}`}>
                                                            <Icon name={i.status === 'paid' ? 'rotate-ccw' : 'check'} size={12}/>
                                                            {i.status === 'paid' ? 'Desmarcar' : 'Marcar Pagado'}
                                                        </button>
                                                        <button onClick={() => deleteItem('expenses', i.id)} className="px-3 bg-white/5 rounded-lg text-slate-600 active-scale"><Icon name="trash-2" size={14}/></button>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </section>

                                {/* SECCIÓN CUOTAS */}
                                <section className="space-y-2 pb-8">
                                    <div className="flex justify-between items-center px-1">
                                        <button 
                                            onClick={() => toggleSection('installments')}
                                            className="flex items-center gap-2 group"
                                        >
                                            <Icon name={openSections.installments ? "chevron-down" : "chevron-right"} size={14} className="text-amber-500"/>
                                            <h3 className="text-[11px] font-black text-amber-500 uppercase tracking-widest flex items-center gap-2">
                                                <Icon name="credit-card" size={14}/> Cuotas / Tarjetas
                                                {!openSections.installments && <span className="text-white/40 ml-1">({data.installments.length} ACTIV.)</span>}
                                            </h3>
                                        </button>
                                        <button onClick={() => addItem('installments')} className="flex items-center gap-1 px-3 py-1.5 bg-amber-600 text-white rounded-lg text-[10px] font-black active-scale shadow-lg shadow-amber-900/30">
                                            <Icon name="plus" size={12}/> AGREGAR
                                        </button>
                                    </div>
                                    <div className={`accordion-content ${openSections.installments ? 'accordion-open' : ''} space-y-3`}>
                                        {data.installments.map(i => {
                                            const progress = (Number(i.paid) / Number(i.total)) * 100;
                                            const isPaid = i.status === 'paid';
                                            return (
                                                <div key={i.id} className={`glass-card p-4 border-l-4 ${isPaid ? 'border-indigo-500 opacity-60' : 'border-amber-500'}`}>
                                                    <div className="flex justify-between items-start mb-3">
                                                        <div className="flex-1">
                                                            <input type="text" value={i.title} onChange={(e) => editFieldInline('installments', i.id, 'title', e.target.value)} className="editable-text font-black text-sm uppercase text-white"/>
                                                            <div className="flex items-center gap-1 mt-1">
                                                                <Icon name="calendar" size={10} className="text-slate-500"/>
                                                                <input type="date" value={i.date} onChange={(e) => editFieldInline('installments', i.id, 'date', e.target.value)} className="editable-text text-[10px] text-slate-400 font-bold w-auto"/>
                                                            </div>
                                                        </div>
                                                        <button onClick={() => deleteItem('installments', i.id)} className="text-slate-600 p-1"><Icon name="trash-2" size={14}/></button>
                                                    </div>

                                                    <div className="flex justify-between items-end mb-4">
                                                        <div>
                                                            <p className="text-[8px] font-black text-slate-500 uppercase tracking-widest">Cuota Mensual</p>
                                                            <div className="flex items-center">
                                                                <span className="text-amber-500 font-bold text-sm mr-1">$</span>
                                                                <input type="text" inputMode="numeric" value={i.monthlyFee === '' ? '' : Number(i.monthlyFee).toLocaleString('es-AR')} onChange={(e) => editFieldInline('installments', i.id, 'monthlyFee', e.target.value.replace(/\D/g, ''))} className="editable-text w-24 font-black text-2xl text-white"/>
                                                            </div>
                                                        </div>
                                                        <div className="flex items-center gap-2 bg-slate-900/50 p-1 rounded-lg border border-white/5">
                                                            <button onClick={() => modifyInstallment(i.id, -1)} className="w-6 h-6 rounded-md bg-white/5 text-slate-400 font-black">-</button>
                                                            <div className="text-[10px] font-black text-white min-w-[30px] text-center">
                                                                {i.paid} <span className="text-slate-500">/</span> {i.total}
                                                            </div>
                                                            <button onClick={() => modifyInstallment(i.id, 1)} className="w-6 h-6 rounded-md bg-white/5 text-slate-400 font-black">+</button>
                                                        </div>
                                                    </div>

                                                    <div className="h-1.5 w-full bg-white/5 rounded-full overflow-hidden mb-4">
                                                        <div className="h-full bg-amber-500 rounded-full transition-all duration-500" style={{ width: `${progress}%` }}></div>
                                                    </div>

                                                    <button onClick={() => toggleStatus('installments', i.id)} className={`w-full py-2 rounded-lg text-[9px] font-black uppercase tracking-widest transition-all flex items-center justify-center gap-2 ${isPaid ? 'bg-indigo-600 text-white' : 'bg-slate-800 text-slate-300 border border-white/5'}`}>
                                                        <Icon name={isPaid ? "check-square" : "square"} size={12}/>
                                                        {isPaid ? 'CUOTA PAGADA' : 'MARCAR CUOTA DEL MES'}
                                                    </button>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </section>
                            </div>
                        )}

                        {view === 'reports' && (
                            <div className="space-y-6 animate-fade pb-10">
                                <div className="text-center pt-4">
                                    <h2 className="text-2xl font-black text-white tracking-tighter">Reporte Mensual</h2>
                                </div>
                                <div className="glass-card p-6">
                                    <FinancialChart data={chartData} />
                                    <div className="grid grid-cols-3 gap-2 mt-8 pt-6 border-t border-white/5">
                                        <div className="text-center">
                                            <p className="text-[8px] font-black text-rose-500 uppercase">Fijos</p>
                                            <p className="text-sm font-bold text-white">${totals.expFixed.toLocaleString('es-AR')}</p>
                                        </div>
                                        <div className="text-center border-x border-white/5">
                                            <p className="text-[8px] font-black text-amber-500 uppercase">Cuotas</p>
                                            <p className="text-sm font-bold text-white">${totals.expInstallments.toLocaleString('es-AR')}</p>
                                        </div>
                                        <div className="text-center">
                                            <p className="text-[8px] font-black text-indigo-500 uppercase">Libre</p>
                                            <p className="text-sm font-bold text-white">${Math.max(0, totals.bal).toLocaleString('es-AR')}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[85%] max-w-sm h-16 bg-slate-900/95 backdrop-blur-3xl border border-white/10 rounded-2xl flex items-center justify-around px-2 shadow-2xl z-50">
                        <button onClick={() => setView('summary')} className={`flex-1 flex flex-col items-center justify-center h-full gap-1 transition-all ${view === 'summary' ? 'text-indigo-400' : 'text-slate-500'}`}>
                            <Icon name="layout-grid" size={22}/>
                            <span className="text-[9px] font-black uppercase tracking-widest">Panel</span>
                        </button>
                        <div className="w-px h-8 bg-white/10"></div>
                        <button onClick={() => setView('reports')} className={`flex-1 flex flex-col items-center justify-center h-full gap-1 transition-all ${view === 'reports' ? 'text-indigo-400' : 'text-slate-500'}`}>
                            <Icon name="pie-chart" size={22}/>
                            <span className="text-[9px] font-black uppercase tracking-widest">Reportes</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
